version: "3.9"

name: gsv-office

networks:
  gsv_network:
    name: ix-gsv-office_gsv_network
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:
  mailserver_data:
  mailserver_state:
  mailserver_logs:

services:
  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy (Frontend with GSV Logo)
  # ─────────────────────────────────────────────
  nginx:
    image: ghcr.io/gsvrnd2025-alt/gsv-office-nginx:${APP_VERSION:-latest}
    container_name: gsv_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /mnt/GSVR_Movies/apps/gsv-office/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /mnt/GSVR_Movies/apps/gsv-office/nginx/conf.d:/etc/nginx/conf.d:ro
      - /mnt/GSVR_Movies/apps/gsv-office/downloads:/var/www/downloads:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - api
    networks:
      - gsv_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # NestJS Backend API
  # ─────────────────────────────────────────────
  api:
    image: ghcr.io/gsvrnd2025-alt/gsv-office-api:${APP_VERSION:-latest}
    container_name: gsv_api
    restart: unless-stopped
    environment:
      # App Settings
      APP_NAME: "GSV Office"
      APP_VERSION: "1.0.29"
      NODE_ENV: "production"
      PORT: 3000
      APP_URL: "http://192.168.0.177:8080"
      APP_DOMAIN: "192.168.0.177"
      
      # JWT Authentication
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "7d"
      
      # Database Connection
      DB_HOST: "postgres"
      DB_PORT: 5432
      DB_NAME: "gsv_office"
      DB_USER: "gsv_admin"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_SSL: "false"
      DB_SYNC: "false"
      DB_LOGGING: "false"
      
      # Redis Connection
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      
      # MinIO Object Storage
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: "gsv_minio_admin"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      MINIO_BUCKET_FILES: "gsv-files"
      MINIO_BUCKET_AVATARS: "gsv-avatars"
      MINIO_BUCKET_CHAT: "gsv-chat"
      
      # Storage Limits
      UPLOAD_PATH: "/app/uploads"
      MAX_FILE_SIZE_MB: 5000

      # Mail SMTP Server Settings
      MAIL_DOMAIN: "gsv.local"
      MAIL_HOST: "mailserver"
      MAIL_PORT: 587
      MAIL_USER: "admin@gsv.local"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_FROM: "GSV Office <noreply@gsv.local>"
      MAIL_SECURE: "false"
      IMAP_HOST: "mailserver"
      IMAP_PORT: 143
      IMAP_SECURE: "false"
      
      # Security & Default Admin
      BCRYPT_ROUNDS: 12
      SESSION_SECRET: "${SESSION_SECRET}"
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 300
      ADMIN_EMAIL: "admin@gsv.local"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      ADMIN_NAME: "System Administrator"
      
      # Company Branding
      COMPANY_NAME: "GSV Office"
      COMPANY_LOGO_URL: "/assets/logo.png"
      COMPANY_PRIMARY_COLOR: "#6366f1"
      COMPANY_SECONDARY_COLOR: "#8b5cf6"
      
      # GST & Billing
      DEFAULT_CURRENCY: "INR"
      DEFAULT_CURRENCY_SYMBOL: "₹"
      DEFAULT_TAX_LABEL: "GST"
      DEFAULT_TIMEZONE: "Asia/Kolkata"
      
      # Logging & Plugins
      LOG_LEVEL: "info"
      LOG_TO_FILE: "true"
      LOG_PATH: "/app/logs"
      PLUGINS_PATH: "/app/plugins"
      PLUGINS_ENABLED: "true"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - gsv_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gsv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "gsv_office"
      POSTGRES_USER: "gsv_admin"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /mnt/GSVR_Movies/apps/gsv-office/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - /mnt/GSVR_Movies/apps/gsv-office/database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - gsv_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsv_admin -d gsv_office"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Redis Cache & Queue
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gsv_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - gsv_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # MinIO Object Storage (S3-compatible)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: gsv_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "gsv_minio_admin"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio_data:/data
    networks:
      - gsv_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Mail Server (SMTP + IMAP)
  # ─────────────────────────────────────────────
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: gsv_mailserver
    hostname: mail.gsv.local
    restart: unless-stopped
    env_file:
      - /mnt/GSVR_Movies/apps/gsv-office/mailserver.env
    ports:
      - "25:25"
      - "143:143"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - mailserver_data:/var/mail
      - mailserver_state:/var/mail-state
      - mailserver_logs:/var/log/mail
      - /mnt/GSVR_Movies/apps/gsv-office/mailserver/config:/tmp/docker-mailserver
    networks:
      - gsv_network
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
