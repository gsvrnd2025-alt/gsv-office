apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  labels:
    app: gsv-office
    service: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: gsv-db-secret
  labels:
    app: gsv-office
type: Opaque
stringData:
  # Default postgres passwords. User should update these.
  POSTGRES_DB: "gsv_office"
  POSTGRES_USER: "gsv_admin"
  POSTGRES_PASSWORD: "gsv_secure_password_2026"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: gsv-office
    service: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gsv-office
      service: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gsv-office
        service: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: gsv-db-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: gsv-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gsv-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: db-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          healthCheck:
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - gsv_admin
                - -d
                - gsv_office
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - gsv_admin
                - -d
                - gsv_office
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: db-init
          hostPath:
            # Mount host folder where schema.sql and seed.sql are stored
            path: /mnt/tank/apps/gsv-office/init
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: gsv-office
    service: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: gsv-office
    service: postgres
  type: ClusterIP
