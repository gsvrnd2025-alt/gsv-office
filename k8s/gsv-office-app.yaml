apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  labels:
    app: gsv-office
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plugins-pvc
  labels:
    app: gsv-office
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: logs-pvc
  labels:
    app: gsv-office
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: gsv-app-secret
  labels:
    app: gsv-office
type: Opaque
stringData:
  JWT_ACCESS_SECRET: "gsv_office_super_secure_access_token_secret_key_2026_production"
  JWT_REFRESH_SECRET: "gsv_office_super_secure_refresh_token_secret_key_2026_production"
  SESSION_SECRET: "gsv_office_session_secret_very_long_string_2026"
  REDIS_PASSWORD: "gsv_redis_password_2026"
  DB_PASSWORD: "gsv_secure_password_2026"
  MINIO_ROOT_PASSWORD: "gsv_minio_password_2026"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gsv-app-config
  labels:
    app: gsv-office
data:
  APP_NAME: "GSV Office"
  NODE_ENV: "production"
  PORT: "3000"
  APP_URL: "http://192.168.0.177"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "gsv_office"
  DB_USER: "gsv_admin"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "minio"
  MINIO_PORT: "9000"
  MINIO_ROOT_USER: "gsv_minio_admin"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: gsv-office
    service: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gsv-office
      service: api
  template:
    metadata:
      labels:
        app: gsv-office
        service: api
    spec:
      containers:
        - name: api
          image: gsv-office-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: api-port
          envFrom:
            - configMapRef:
                name: gsv-app-config
          env:
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: gsv-app-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gsv-app-secret
                  key: JWT_REFRESH_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: gsv-app-secret
                  key: SESSION_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gsv-app-secret
                  key: REDIS_PASSWORD
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gsv-app-secret
                  key: DB_PASSWORD
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gsv-app-secret
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: uploads-store
              mountPath: /app/uploads
            - name: plugins-store
              mountPath: /app/plugins
            - name: logs-store
              mountPath: /app/logs
          resources:
            limits:
              cpu: "1.5"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
      volumes:
        - name: uploads-store
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: plugins-store
          persistentVolumeClaim:
            claimName: plugins-pvc
        - name: logs-store
          persistentVolumeClaim:
            claimName: logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: gsv-office
    service: api
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: api
  selector:
    app: gsv-office
    service: api
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: gsv-office
    service: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gsv-office
      service: nginx
  template:
    metadata:
      labels:
        app: gsv-office
        service: nginx
    spec:
      containers:
        - name: nginx
          image: gsv-office-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: uploads-store
              mountPath: /var/www/uploads
              readOnly: true
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: uploads-store
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    app: gsv-office
    service: nginx
spec:
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      name: http
  selector:
    app: gsv-office
    service: nginx
  # Using NodePort to expose the platform on your local host IPs (192.168.0.177/188) at port 30080.
  # If your K8s environment supports a LoadBalancer, change type to LoadBalancer and map IP.
  type: NodePort
