<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1e1b4b"/>
  <!-- Oval outline like GSV logo -->
  <ellipse cx="32" cy="32" rx="28" ry="20" fill="none" stroke="#cc2222" stroke-width="2.5"/>
  <!-- G letter (red) -->
  <text x="10" y="41" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#cc2222">G</text>
  <!-- Lightning bolt (yellow-green) -->
  <polygon points="31,14 26,34 31,32 26,50 37,28 31,30" fill="#f0d000"/>
  <!-- V letter (silver/white) -->
  <text x="38" y="44" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#c0c0c0">V</text>
</svg>
