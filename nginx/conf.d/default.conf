upstream gsv_api {
    server api:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static Frontend ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── API Proxy ────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://gsv_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── Auth rate limiting ───────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://gsv_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WebSocket (Socket.IO) ────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://gsv_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── File Uploads (larger body) ───────────────────────────────
    location /api/files/upload {
        limit_req zone=upload_limit burst=20 nodelay;
        client_max_body_size 5000M;
        proxy_pass http://gsv_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
        client_body_timeout 3600s;
    }

    location /api/files/upload-folder {
        limit_req zone=upload_limit burst=50 nodelay;
        client_max_body_size 5000M;
        proxy_pass http://gsv_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
        client_body_timeout 3600s;
    }

    # ── Uploaded files served directly as static assets ───────────
    # ^~ prefix gives this location priority over the regex caching block above
    location ^~ /uploads/ {
        root /var/www;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri =404;
        client_max_body_size 5000M;
    }

    # ── Client downloads served directly as static assets ─────────
    location ^~ /downloads/ {
        root /var/www;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri =404;
        client_max_body_size 5000M;
    }


    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass http://gsv_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
