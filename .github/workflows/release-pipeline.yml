name: GSV Office - Production Release Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - '**/package.json'
      - 'build-metadata.json'
      - 'docker-compose-truenas.yml'
      - 'helm-chart/**'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Semantic version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/gsv-office-api
  IMAGE_NGINX: ghcr.io/${{ github.repository_owner }}/gsv-office-nginx

jobs:
  build-and-test:
    name: Build & Verify Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Verify Backend Compilation
        run: |
          cd backend
          npm ci
          npm run build

      - name: Verify Frontend Compilation
        run: |
          cd frontend
          npm ci
          npm run build

  release-and-publish:
    name: Automated SemVer Release
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (Full History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump Version & Update Metadata
        id: bump
        run: |
          BUMP_TYPE="patch"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          fi
          
          # Run release script to update packages, configs, charts
          node scripts/release.js $BUMP_TYPE
          
          # Extract the new version from frontend/package.json
          NEW_VERSION=$(node -e "console.log(require('./frontend/package.json').version)")
          echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "plain_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit & Push Version Changes
        run: |
          git add -A
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.version }} [skip ci]" || echo "No changes to commit"
          git tag -a ${{ steps.bump.outputs.version }} -m "Release ${{ steps.bump.outputs.version }}"
          git push origin main --tags --force

      - name: Create Release Artifact ZIP
        run: |
          zip -r release-source-${{ steps.bump.outputs.version }}.zip . -x "*.git*" "*node_modules*" "*.env*" "*downloads*" "*uploads*" "*logs*"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dist Directories
        run: |
          cd backend
          npm ci
          npm run build
          cd ../frontend
          npm ci
          npm run build

      - name: Build & Push NestJS API Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ steps.bump.outputs.version }}
            ${{ env.IMAGE_API }}:${{ steps.bump.outputs.plain_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push React/Nginx Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NGINX }}:latest
            ${{ env.IMAGE_NGINX }}:${{ steps.bump.outputs.version }}
            ${{ env.IMAGE_NGINX }}:${{ steps.bump.outputs.plain_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Release Notes & Create GH Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: Release ${{ steps.bump.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-source-${{ steps.bump.outputs.version }}.zip
            build-metadata.json
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
